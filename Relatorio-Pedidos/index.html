<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Pedidos | Vesti</title>
    <script src="dados.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e1e4eb;min-height:100vh;}
        .header{background:linear-gradient(135deg,#1a1d2e,#252840);padding:20px 30px;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;justify-content:space-between;}
        .header h1{font-size:20px;background:linear-gradient(135deg,#7C3AED,#06B6D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .header span{color:#8b8fa3;font-size:12px;}
        .controls{padding:16px 30px;background:#161825;border-bottom:1px solid #2a2d3e;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
        input,select{background:#1e2035;border:1px solid #2a2d3e;color:#e1e4eb;padding:8px 12px;border-radius:8px;font-size:13px;}
        input:focus,select:focus{outline:none;border-color:#7C3AED;}
        input[type=text]{width:250px;}
        .btn{background:linear-gradient(135deg,#7C3AED,#06B6D4);color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}
        .btn:hover{opacity:0.9;} .btn-clear{background:#2a2d3e;color:#8b8fa3;}
        .kpi-row{display:flex;gap:12px;padding:16px 30px;flex-wrap:wrap;}
        .kpi{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:10px;padding:14px 18px;min-width:150px;flex:1;}
        .kpi-label{font-size:11px;color:#8b8fa3;text-transform:uppercase;letter-spacing:0.5px;}
        .kpi-val{font-size:22px;font-weight:700;margin-top:4px;}
        .content{padding:0 30px 30px;}
        .table-wrap{overflow-x:auto;margin-top:16px;border-radius:10px;border:1px solid #2a2d3e;}
        table{width:100%;border-collapse:collapse;font-size:13px;}
        th{background:#1a1d2e;padding:10px 12px;text-align:left;font-weight:600;color:#8b8fa3;position:sticky;top:0;cursor:pointer;white-space:nowrap;border-bottom:2px solid #2a2d3e;}
        th:hover{color:#7C3AED;}
        td{padding:8px 12px;border-bottom:1px solid #1e2035;white-space:nowrap;}
        tr:hover{background:#1e2035;}
        .num{text-align:right;font-variant-numeric:tabular-nums;}
        .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
        .badge-sim{background:rgba(16,185,129,0.15);color:#10B981;}
        .badge-nao{background:rgba(239,68,68,0.15);color:#EF4444;}
        .expand-btn{background:none;border:none;color:#7C3AED;cursor:pointer;font-size:12px;text-decoration:underline;}
        .meses-row{display:none;} .meses-row.open{display:table-row;}
        .meses-table{font-size:11px;margin:4px 0;} .meses-table td,.meses-table th{padding:4px 8px;border:1px solid #2a2d3e;}
        .meses-table th{background:#161825;}
        .info{color:#8b8fa3;font-size:12px;padding:8px 30px;}
        .export-btn{background:#1a1d2e;border:1px solid #2a2d3e;color:#06B6D4;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;}
        .export-btn:hover{background:#252840;}
    </style>
</head>
<body>
<div class="header">
    <div><h1>Relatório de Pedidos</h1><span>Merged Pedidos + Cadastros + Marcas + Config</span></div>
    <div style="text-align:right"><span>Gerado: <span id="gerado"></span></span></div>
</div>
<div class="controls">
    <input type="text" id="busca" placeholder="Buscar empresa, CNPJ ou marca..." oninput="render()">
    <select id="fCanal" onchange="render()"><option value="">Todos os Canais</option></select>
    <select id="fAnjo" onchange="render()"><option value="">Todos os Anjos</option></select>
    <select id="fCartao" onchange="render()"><option value="">Cartão</option><option value="Sim">Sim</option><option value="Não">Não</option></select>
    <select id="fPix" onchange="render()"><option value="">PIX</option><option value="Sim">Sim</option><option value="Não">Não</option></select>
    <button class="btn-clear" onclick="clearAll()">Limpar</button>
    <button class="export-btn" onclick="exportCSV()">Exportar CSV</button>
</div>
<div class="kpi-row" id="kpis"></div>
<div class="info" id="info"></div>
<div class="content">
    <div class="table-wrap" style="max-height:calc(100vh - 280px);overflow-y:auto;">
        <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    </div>
</div>
<script>
const E=DADOS.empresas;
document.getElementById('gerado').textContent=new Date(DADOS.gerado).toLocaleString('pt-BR');

// Populate filters
const canais=[...new Set(E.map(e=>e.canal).filter(Boolean))].sort();
const anjos=[...new Set(E.map(e=>e.anjo).filter(Boolean))].sort();
canais.forEach(c=>{const o=document.createElement('option');o.value=c;o.text=c;document.getElementById('fCanal').appendChild(o);});
anjos.forEach(a=>{const o=document.createElement('option');o.value=a;o.text=a;document.getElementById('fAnjo').appendChild(o);});

const fmtN=v=>(v||0).toLocaleString('pt-BR');
const fmtC=v=>'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

let sortCol='pedidos',sortDir=-1;
const cols=[
    {key:'nome',label:'Empresa'},
    {key:'cnpj',label:'CNPJ'},
    {key:'marcaNome',label:'Marca'},
    {key:'plano',label:'Plano'},
    {key:'anjo',label:'Anjo'},
    {key:'canal',label:'Canal'},
    {key:'cartao',label:'Cartão',fmt:v=>v==='Sim'?'<span class="badge badge-sim">Sim</span>':'<span class="badge badge-nao">Não</span>'},
    {key:'pix',label:'PIX',fmt:v=>v==='Sim'?'<span class="badge badge-sim">Sim</span>':'<span class="badge badge-nao">Não</span>'},
    {key:'integ',label:'Integração',fmt:v=>v==='Sim'?'<span class="badge badge-sim">Sim</span>':'<span class="badge badge-nao">Não</span>'},
    {key:'pedidos',label:'Pedidos',cls:'num'},
    {key:'pagos',label:'Pagos',cls:'num'},
    {key:'cancelados',label:'Cancelados',cls:'num'},
    {key:'pendentes',label:'Pendentes',cls:'num'},
    {key:'valTotal',label:'Valor Total',cls:'num',fmt:v=>fmtC(v)},
    {key:'valPagos',label:'Valor Pagos',cls:'num',fmt:v=>fmtC(v)},
    {key:'cobrado',label:'Cobrado Plano',cls:'num',fmt:v=>v?fmtC(v):'-'},
    {key:'_meses',label:'Meses'},
];

// Render header
document.getElementById('thead').innerHTML='<tr>'+cols.map(c=>'<th'+(c.cls?' class="'+c.cls+'"':'')+' onclick="sortBy(\''+c.key+'\')">'+c.label+'</th>').join('')+'</tr>';

function getFiltered(){
    const q=(document.getElementById('busca').value||'').toLowerCase();
    const fc=document.getElementById('fCanal').value;
    const fa=document.getElementById('fAnjo').value;
    const fca=document.getElementById('fCartao').value;
    const fp=document.getElementById('fPix').value;
    return E.filter(e=>{
        if(q&&!e.nome.toLowerCase().includes(q)&&!(e.cnpj||'').includes(q)&&!(e.marcaNome||'').toLowerCase().includes(q))return false;
        if(fc&&e.canal!==fc)return false;
        if(fa&&e.anjo!==fa)return false;
        if(fca&&e.cartao!==fca)return false;
        if(fp&&e.pix!==fp)return false;
        return true;
    });
}

function render(){
    const f=getFiltered();
    f.sort((a,b)=>{
        let va=a[sortCol],vb=b[sortCol];
        if(typeof va==='string')return sortDir*va.localeCompare(vb);
        return sortDir*((va||0)-(vb||0));
    });

    // KPIs
    const totPed=f.reduce((s,e)=>s+e.pedidos,0);
    const totPag=f.reduce((s,e)=>s+e.pagos,0);
    const totCanc=f.reduce((s,e)=>s+e.cancelados,0);
    const totPend=f.reduce((s,e)=>s+e.pendentes,0);
    const totVal=f.reduce((s,e)=>s+e.valTotal,0);
    const totValPag=f.reduce((s,e)=>s+e.valPagos,0);
    document.getElementById('kpis').innerHTML=[
        {l:'Empresas',v:fmtN(f.length),c:'#7C3AED'},
        {l:'Total Pedidos',v:fmtN(totPed),c:'#06B6D4'},
        {l:'Pedidos Pagos',v:fmtN(totPag),c:'#10B981'},
        {l:'Cancelados',v:fmtN(totCanc),c:'#EF4444'},
        {l:'Pendentes',v:fmtN(totPend),c:'#F59E0B'},
        {l:'Valor Total',v:fmtC(totVal),c:'#7C3AED'},
        {l:'Valor Pagos',v:fmtC(totValPag),c:'#10B981'},
    ].map(k=>'<div class="kpi"><div class="kpi-label">'+k.l+'</div><div class="kpi-val" style="color:'+k.c+'">'+k.v+'</div></div>').join('');

    document.getElementById('info').textContent='Mostrando '+Math.min(f.length,500)+' de '+f.length+' empresas'+(f.length>500?' (limitado a 500 linhas)':'');

    // Table
    const show=f.slice(0,500);
    document.getElementById('tbody').innerHTML=show.map((e,i)=>{
        const row='<tr>'+cols.map(c=>{
            if(c.key==='_meses')return'<td><button class="expand-btn" onclick="toggleMeses('+i+')">ver</button></td>';
            const v=e[c.key];
            const display=c.fmt?c.fmt(v):(v!=null?v:'-');
            return'<td'+(c.cls?' class="'+c.cls+'"':'')+'>'+display+'</td>';
        }).join('')+'</tr>';
        // Meses sub-row
        let mesRow='<tr class="meses-row" id="meses-'+i+'"><td colspan="'+cols.length+'" style="background:#161825;padding:10px;">';
        if(e.meses&&e.meses.length>0){
            mesRow+='<table class="meses-table"><tr><th>Mês</th><th>Pedidos</th><th>Pagos</th><th>Cancelados</th><th>Pendentes</th><th>Valor Total</th><th>Valor Pagos</th></tr>';
            mesRow+=e.meses.map(m=>'<tr><td>'+m[0]+'</td><td class="num">'+fmtN(m[1])+'</td><td class="num">'+fmtN(m[2])+'</td><td class="num">'+fmtN(m[3])+'</td><td class="num">'+fmtN(m[4])+'</td><td class="num">'+fmtC(m[5])+'</td><td class="num">'+fmtC(m[6])+'</td></tr>').join('');
            mesRow+='</table>';
        } else mesRow+='<span style="color:#8b8fa3">Sem dados mensais</span>';
        mesRow+='</td></tr>';
        return row+mesRow;
    }).join('');
}

function sortBy(col){
    if(sortCol===col)sortDir*=-1; else{sortCol=col;sortDir=col==='nome'||col==='cnpj'||col==='marcaNome'?1:-1;}
    render();
}
function toggleMeses(i){const el=document.getElementById('meses-'+i);el.classList.toggle('open');}
function clearAll(){document.getElementById('busca').value='';document.getElementById('fCanal').value='';document.getElementById('fAnjo').value='';document.getElementById('fCartao').value='';document.getElementById('fPix').value='';render();}

function exportCSV(){
    const f=getFiltered();
    const header='Empresa,CNPJ,Marca,Plano,Anjo,Canal,Cartao,PIX,Integracao,Pedidos,Pagos,Cancelados,Pendentes,Valor Total,Valor Pagos,Cobrado Plano\n';
    const rows=f.map(e=>[e.nome,e.cnpj,e.marcaNome,e.plano,e.anjo,e.canal,e.cartao,e.pix,e.integ,e.pedidos,e.pagos,e.cancelados,e.pendentes,e.valTotal,e.valPagos,e.cobrado].map(v=>'"'+(v!=null?v:'')+ '"').join(',')).join('\n');
    const blob=new Blob(['\uFEFF'+header+rows],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='relatorio_pedidos.csv';a.click();
}

render();
</script>
</body>
</html>
