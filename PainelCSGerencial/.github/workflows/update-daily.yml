name: Atualizar Dashboard Diariamente

on:
  schedule:
    - cron: '30 7 * * *'  # 4:30am BRT (UTC-3 = 7:30 UTC)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar ODBC Driver 18 for SQL Server
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -qq
          sudo ACCEPT_EULA=Y apt-get install -y -qq msodbcsql18 unixodbc-dev

      - name: Instalar dependencias Python
        run: pip install pyodbc openpyxl google-auth

      - name: Preparar secrets
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          FABRIC_SQL_ENDPOINT: ${{ secrets.FABRIC_SQL_ENDPOINT }}
          FABRIC_DATABASE: ${{ secrets.FABRIC_DATABASE }}
        run: |
          echo "$GOOGLE_SA_JSON" > google_sa.json
          echo "HUBSPOT_TOKEN=$HUBSPOT_TOKEN" > .env.local
          cat > fabric_config.json <<EOF
          {
            "sql_endpoint": "${FABRIC_SQL_ENDPOINT:-7sowj2vsfd6efgf3phzgjfmvaq-nrdsskmspnteherwztit766zc4.datawarehouse.fabric.microsoft.com}",
            "database": "${FABRIC_DATABASE:-VestiHouse}"
          }
          EOF

      - name: Login Azure (service principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Rodar pipeline
        continue-on-error: false
        run: |
          python fetch_fabric.py || echo "WARN: fetch_fabric falhou"
          python fetch_sheets.py || echo "WARN: fetch_sheets falhou"
          python fetch_users.py || echo "WARN: fetch_users falhou"
          python fetch_hubspot.py || echo "WARN: fetch_hubspot falhou"
          python merge_data.py
          python build_html.py

      - name: Limpar secrets do filesystem
        if: always()
        run: rm -f google_sa.json .env.local fabric_config.json

      - name: Commit e push se houver mudancas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html dashboard_full_data.js 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Atualizacao automatica $(date +'%d/%m/%Y %H:%M')"
          git push
